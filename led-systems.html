<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Системы управления LED - 7lamp Education</title>
</head>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
/* Кнопка возврата к главной странице портала */
.back-to-portal{display:flex;align-items:center;gap:8px;padding:10px 20px;background:#fff;border-bottom:1px solid #e0e4ec;font-family:'JetBrains Mono',monospace;font-size:12px;color:#3b82f6;text-decoration:none;letter-spacing:.03em;transition:background .2s}
.back-to-portal:hover{background:#f0f4ff;color:#2563eb}
.wrap{background:#f5f6f8;color:#1a2030;font-family:'JetBrains Mono',monospace;min-height:600px}
.sys-tabs{display:flex;background:#fff;border-bottom:1.5px solid #e0e4ec;overflow-x:auto;scrollbar-width:none}
.sys-tabs::-webkit-scrollbar{display:none}
.sys-tab{flex-shrink:0;padding:10px 20px;font-size:11px;font-family:'JetBrains Mono',monospace;color:#9aa0b0;cursor:pointer;border-bottom:2.5px solid transparent;letter-spacing:.07em;text-transform:uppercase;transition:all .2s;white-space:nowrap;background:#fff}
.sys-tab.active{color:var(--tc);border-bottom-color:var(--tc);font-weight:600}
.sys-tab:hover:not(.active){color:#5a6070}
.diagram-area{position:relative;width:100%;background:#f5f6f8}
svg.main{width:100%;display:block}
.flow-legend{display:flex;gap:18px;padding:8px 16px;background:#fff;border-top:1px solid #e8eaf0;flex-wrap:wrap}
.fl-item{display:flex;align-items:center;gap:7px;font-size:10px;color:#7080a0}
.fl-dot{width:28px;height:3px;border-radius:2px}
.comp-tabs{display:flex;background:#fff;border-bottom:1px solid #e8eaf0;border-top:1px solid #e8eaf0}
.comp-tab{flex:1;padding:9px 4px;text-align:center;font-size:10px;letter-spacing:.06em;color:#9aa0b0;cursor:pointer;border-bottom:2.5px solid transparent;font-family:'JetBrains Mono',monospace;text-transform:uppercase;transition:all .15s;background:#fff}
.comp-tab.active{color:var(--tc);border-bottom-color:var(--tc);font-weight:600}
.info-panel{background:#fff;padding:1.1rem 1.4rem;min-height:165px;border-top:none}
.info-panel h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:6px}
.info-panel p{font-size:11.5px;line-height:1.75;color:#5a6880}
.specs-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 18px;margin-top:8px}
.spec-row{font-size:11px;color:#5a6880;display:flex;gap:6px}
.spec-row span:first-child{color:#aab0c0;min-width:100px;flex-shrink:0}
.tip-text{font-size:11.5px;line-height:1.75;color:#5a6880;border-left:2.5px solid var(--tc);padding-left:10px;margin-top:6px}
.hint{text-align:center;font-size:10px;color:#c0c8d8;padding:7px 0 2px;letter-spacing:.05em}
.tc-content{display:none}.tc-content.active{display:block}
.fa{stroke-dasharray:6 4;animation:da 1.1s linear infinite}
.fg{stroke-dasharray:4 4;animation:dg .9s linear infinite}
.fr{stroke-dasharray:8 4;animation:dr .7s linear infinite}
.fb{stroke-dasharray:5 3;animation:db 1.4s linear infinite}
.fd{stroke-dasharray:4 3;animation:dd 1.0s linear infinite}
.fv{stroke-dasharray:5 4;animation:dv 1.2s linear infinite}
@keyframes da{to{stroke-dashoffset:-20}}
@keyframes dg{to{stroke-dashoffset:-16}}
@keyframes dr{to{stroke-dashoffset:-24}}
@keyframes db{to{stroke-dashoffset:-16}}
@keyframes dd{to{stroke-dashoffset:-14}}
@keyframes dv{to{stroke-dashoffset:-18}}
.node{cursor:pointer}.node rect,.node circle{transition:filter .2s}.node:hover rect,.node:hover circle{filter:brightness(.93)}
.lp{animation:lp 2s ease-in-out infinite}.lr{animation:lp 2s ease-in-out infinite .3s}.lg{animation:lp 2s ease-in-out infinite .6s}.lb{animation:lp 2s ease-in-out infinite .9s}
@keyframes lp{0%,100%{opacity:.5}50%{opacity:1}}
</style>

<!-- Кнопка возврата на главную портала -->
<a href="index.html" class="back-to-portal">&larr; Назад к порталу</a>

<div class="wrap" id="root">
<div class="sys-tabs" id="sys-tabs">
  <div class="sys-tab active" style="--tc:#0e9e6e" onclick="switchSys('rgbw')" id="st-rgbw">RGBW</div>
  <div class="sys-tab" style="--tc:#c03030" onclick="switchSys('rgb')" id="st-rgb">RGB</div>
  <div class="sys-tab" style="--tc:#606060" onclick="switchSys('mono')" id="st-mono">Монохром</div>
  <div class="sys-tab" style="--tc:#1878c0" onclick="switchSys('dali')" id="st-dali">DALI</div>
  <div class="sys-tab" style="--tc:#c08010" onclick="switchSys('v10')" id="st-v10">0–10В</div>
</div>

<div class="hint" id="hint-text">Нажмите на компонент для изучения · RGBW система</div>
<div class="diagram-area" id="diagram-area"></div>
<div class="flow-legend" id="flow-legend"></div>
<div class="comp-tabs" style="--tc:#0e9e6e" id="comp-tabs">
  <div class="comp-tab active" onclick="switchCT('desc')" id="ct-desc">Описание</div>
  <div class="comp-tab" onclick="switchCT('spec')" id="ct-spec">Характеристики</div>
  <div class="comp-tab" onclick="switchCT('tips')" id="ct-tips">Советы</div>
</div>
<div class="info-panel" style="--tc:#0e9e6e" id="info-panel">
  <div id="tc-desc" class="tc-content active">
    <h3 style="color:#0e9e6e">← Выберите компонент</h3>
    <p>Нажмите на любой блок схемы для детального изучения его роли, характеристик и практических рекомендаций.</p>
  </div>
  <div id="tc-spec" class="tc-content"><p style="color:#c0c8d8">Выберите компонент</p></div>
  <div id="tc-tips" class="tc-content"><p style="color:#c0c8d8">Выберите компонент</p></div>
</div>
</div>

<script>
const sysData = {
  rgbw:{name:'RGBW',color:'#0e9e6e',
    legend:[{c:'#d03030',l:'220В AC'},{c:'#d08010',l:'DC питание'},{c:'#0e9e6e',l:'ШИМ сигнал'},{c:'#1878c0',l:'Выход 4 канала'}],
    nodes:{
      ac:{title:'Сеть 220В / 50Гц',tag:'AC ИСТОЧНИК',desc:'Стандартная бытовая сеть подаётся на два отдельных блока питания. Вся система работает на постоянном токе (DC). Никогда не подавайте 220В напрямую на контроллер или ленту.',specs:[['Напряжение','220–240В AC'],['Частота','50 Гц'],['Подключение','к обоим БП'],['Защита','УЗО + автомат']],tips:'Используйте УЗО и дифавтомат. Суммируйте нагрузку обоих БП при выборе автомата. Кабель ВВГнг 3×1.5 мм². Разводите AC-проводку отдельно от DC.'},
      bp1:{title:'БП №1 — питание контроллера',tag:'БП МАЛЫЙ',desc:'Маломощный блок питания для контроллера. Контроллер потребляет немного — достаточно 12–24В / 1–2А. Mean Well EPS-15 или HDR-15.',specs:[['Напряжение','12В или 24В DC'],['Ток','1–2А'],['Мощность','15–30 Вт'],['Тип','импульсный SMPS'],['Пульсации','<120 мВ']],tips:'Напряжение должно совпадать с напряжением ленты. Можно запитать контроллер от основного БП если у него нет отдельного входа. Выбирайте БП с малыми пульсациями для стабильной ШИМ.'},
      bp2:{title:'БП №2 — силовое питание',tag:'БП СИЛОВОЙ',desc:'Основной БП питает усилитель и через него всю ленту. Мощность: Pленты × 1.25. Mean Well LRS или HLG-серия.',specs:[['Напряжение','12В или 24В DC'],['Расчёт','Вт/м × метры × 1.25'],['Пример','10м × 20Вт × 1.25 = 250Вт'],['КПД','>88%'],['Серия','Mean Well LRS/HLG']],tips:'Не нагружайте более 80% от номинала. При >5м ленты на 12В — переходите на 24В. Заземляйте корпус БП.'},
      ctrl:{title:'Контроллер RGBW',tag:'КОНТРОЛЛЕР',desc:'Формирует 4 независимых ШИМ-канала (R, G, B, W). Скважность ШИМ определяет яркость. Не является силовым устройством — управляет усилителем.',specs:[['Каналов','4 (R+G+B+W)'],['Ток на канал','до 2А'],['ШИМ','500–2000 Гц'],['Интерфейс','Wi-Fi/BT/RF/DMX512'],['Питание','12–24В DC']],tips:'Высокая частота ШИМ (>1000Гц) важна для видеосъёмки. При DMX — правильно адресуйте контроллер. Для каскадирования зон используйте несколько усилителей.'},
      amp:{title:'Усилитель RGBW',tag:'УСИЛИТЕЛЬ',desc:'Принимает слабый ШИМ от контроллера и воспроизводит его с большой мощностью. Форма сигнала от контроллера, ток — от своего БП.',specs:[['Каналов','4 (R+G+B+W)'],['Ток на канал','до 6А'],['Макс. мощность','576 Вт'],['Вход','ШИМ малый ток'],['Охлаждение','пассивное, алюминий']],tips:'1 усилитель = 1 зона. Каскадируйте: выход → вход следующего. Следите за температурой — при >60°C деградирует.'},
      led:{title:'Лента RGBW',tag:'СВЕТОВОЙ ПРИБОР',desc:'4-кристальные светодиоды: R+G+B + белый кристалл. Белый канал даёт натуральный белый без смешения трёх цветов — ключевое отличие от RGB.',specs:[['Чип','5050 RGBW, 60 LED/м'],['Мощность','14–20 Вт/м'],['CRI белого','>80 Ra (стандарт)'],['Белый','2700/4000/6500K'],['Защита','IP20/IP65/IP68']],tips:'CRI >90 для магазинов, музеев, студий. 24В лента — меньше потерь. Алюминиевый профиль обязателен. Макс. без усилителя: 5м (12В) / 10м (24В).'}
    },svgFn:svgRGBW},
  rgb:{name:'RGB',color:'#c03030',
    legend:[{c:'#d03030',l:'220В AC'},{c:'#d08010',l:'DC питание'},{c:'#c03030',l:'ШИМ 3 канала'}],
    nodes:{
      ac:{title:'Сеть 220В / 50Гц',tag:'AC ИСТОЧНИК',desc:'В RGB-системе обычно достаточно одного БП. Контроллер RGB часто запитывается от того же источника, что и лента.',specs:[['Напряжение','220–240В AC'],['Частота','50 Гц'],['Защита','УЗО + автомат'],['Кабель','ВВГнг 3×1.5 мм²']],tips:'В бюджетных инсталляциях контроллер и лента питаются от одного БП. Для профессиональных — разделяйте цепи.'},
      bp:{title:'Блок питания — единый',tag:'БП',desc:'В RGB-системе один БП питает и контроллер, и ленту. При полном белом (R+G+B=100%) потребление максимально.',specs:[['Напряжение','12В или 24В DC'],['Расчёт','Вт/м × длина × 1.25'],['Белый','= R+G+B одновременно']],tips:'Белый в RGB = микс трёх каналов — мощность равна сумме трёх каналов. Это выше, чем отдельный W-кристалл в RGBW.'},
      ctrl:{title:'Контроллер RGB',tag:'КОНТРОЛЛЕР',desc:'3-канальный ШИМ: R, G, B. Смешением трёх цветов получается любой оттенок. Белый = R+G+B=100%, но он менее эффективен, чем настоящий W-кристалл.',specs:[['Каналов','3 (R+G+B)'],['ШИМ','500–2000 Гц'],['Цветовой охват','~16 млн оттенков'],['Интерфейс','RF/IR/Wi-Fi/DMX']],tips:'Для насыщенного белого RGB не подходит — используйте RGBW. RGB идеален для декоративной подсветки, акцентов, иллюминации.'},
      amp:{title:'Усилитель RGB',tag:'УСИЛИТЕЛЬ',desc:'3-канальный усилитель. Применяется при длинных прогонах. Принцип тот же: усиливает ШИМ-сигнал, питается от своего БП.',specs:[['Каналов','3 (R+G+B)'],['Ток на канал','до 6А'],['Макс. мощность','432Вт']],tips:'Если длина ≤5м (12В) или ≤10м (24В) — усилитель не нужен, контроллер справляется напрямую.'},
      led:{title:'Лента RGB',tag:'СВЕТОВОЙ ПРИБОР',desc:'3-кристальные светодиоды R+G+B. Нет белого кристалла. Широко применяется в декоративной и архитектурной подсветке.',specs:[['Чип','5050 RGB, 30/60/120 LED/м'],['Мощность','7–15 Вт/м'],['Белый','= R+G+B, CRI<75'],['Защита','IP20/IP65/IP68']],tips:'Низкий CRI белого — ограничение RGB. Не используйте там, где важна цветопередача. Лучший выбор для цветной атмосферы и фасадов.'}
    },svgFn:svgRGB},
  mono:{name:'Монохром',color:'#505060',
    legend:[{c:'#d03030',l:'220В AC'},{c:'#d08010',l:'DC питание'},{c:'#505060',l:'ШИМ 1 канал'}],
    nodes:{
      ac:{title:'Сеть 220В / 50Гц',tag:'AC ИСТОЧНИК',desc:'Однофазная сеть. Монохромная система — самая простая и надёжная. Один БП, один диммер.',specs:[['Напряжение','220–240В AC'],['Защита','автомат C6–C16'],['Кабель','ВВГнг 3×1.5 мм²']],tips:'Монохром — самая распространённая схема. При нагрузках >2кВт используйте трёхфазное распределение.'},
      bp:{title:'Блок питания',tag:'БП',desc:'Один БП питает весь канал. Расчёт прост: суммируйте мощность всех светильников + 20% запас.',specs:[['Напряжение','12В или 24В DC'],['Расчёт','Вт/м × длина × 1.2'],['Серия','Mean Well LRS/HLG'],['КПД','>88%']],tips:'24В предпочтительнее для прогонов >5м. HLG-серия с IP67 для уличного монтажа. Dimming-версии HLG поддерживают встроенное диммирование.'},
      dimmer:{title:'Диммер / ШИМ-контроллер',tag:'ДИММЕР',desc:'Однокнальный диммер на ШИМ. Управляет яркостью 0–100% изменением скважности импульсов.',specs:[['Каналов','1'],['Ток','до 8–15А'],['ШИМ-частота','500–2000 Гц'],['Управление','кнопка/потенциометр/RF']],tips:'Частота ШИМ >1000Гц устраняет мерцание для видеосъёмки. Диммеры с плавным стартом продлевают срок ленты.'},
      led:{title:'Монохромная лента',tag:'ЛЕНТА',desc:'Одноцветная лента: тёплый (2700–3000К), нейтральный (4000К) или холодный (5000–6500К) белый. Самый высокий КПД среди лент.',specs:[['Чипы','2835 / 3528 / 5630'],['LED/м','60 / 120 / 240'],['Мощность','4–25 Вт/м'],['CRI','>80 Ra / >90 Ra Hi-CRI']],tips:'Hi-CRI (>95 Ra) для торговли, музеев, медицины. Для равномерности: ≥120 LED/м или матовый рассеиватель в профиле.'}
    },svgFn:svgMono},
  dali:{name:'DALI',color:'#1878c0',
    legend:[{c:'#d03030',l:'230В AC силовая шина'},{c:'#1878c0',l:'DALI шина (16В)'},{c:'#d08010',l:'DC питание шины'}],
    nodes:{
      ac:{title:'Сеть 230В / 50Гц',tag:'AC СИЛОВАЯ ШИНА',desc:'DALI имеет две независимые шины: силовую (230В AC) и управляющую (DALI-шину 16В DC). Принципиальное отличие от ШИМ-систем.',specs:[['Силовая шина','230В AC'],['DALI шина','16В DC, макс 250мА'],['Кабель DALI','витая пара 2×0.75 мм²']],tips:'Используйте маркированный кабель для DALI-шины. Соблюдайте полярность — некоторые устройства полярно-чувствительны.'},
      psu:{title:'Блок питания DALI-шины',tag:'БП DALI',desc:'Специальный источник 16В DC, макс. 250мА для питания DALI-шины. Встроен в большинство контроллеров.',specs:[['Напряжение','16В DC'],['Ток','макс. 250мА'],['Устройств','до 64 на шину'],['Потребление','~2мА / устройство']],tips:'На шине до 64 устройств. Считайте потребление: 64 × 2мА = 128мА — в норме. При >250мА шина нестабильна.'},
      ctrl:{title:'DALI-контроллер / Мастер',tag:'DALI МАСТЕР',desc:'Центральный узел. Инициализирует шину, присваивает адреса (0–63), объединяет в группы (0–15) и сцены (0–15).',specs:[['Протокол','IEC 62386 (DALI-2)'],['Адреса','64 на шину'],['Групп','16'],['Сцен','16 на устройство'],['Интерфейс','Ethernet/KNX/BACnet']],tips:'DALI-2 — актуальный стандарт с обязательной сертификацией. Для крупных объектов используйте KNX + DALI.'},
      ecg:{title:'ECG — электронный драйвер',tag:'ECG / DRIVER',desc:'Интеллектуальный драйвер с DALI-интерфейсом. Принимает команды по шине, регулирует мощность светодиода. Логарифмическое диммирование = линейное восприятие.',specs:[['Стандарт','IEC 62386-102'],['Адресация','0–63'],['Диммирование','0.1–100%'],['Кривая','логарифмическая'],['DT8','Tunable White CCT']],tips:'Device Type 8 (DT8) — управление цветовой температурой. Идеально для HCL (Human Centric Lighting). Для аварийного света — отдельная шина Part 202/203.'},
      led:{title:'Светодиодный светильник',tag:'СВЕТИЛЬНИК',desc:'Светильник с DALI ECG. Питание от 230В силовой шины, управление по DALI. Может быть downlight, трековым или линейным.',specs:[['Питание','230В AC'],['Управление','DALI-шина'],['Диммирование','0.1–100%'],['DT8','Tunable White'],['Аварийный','Part 202/203']],tips:'DT8 для управления CCT (Tunable White) — имитация дневного света, биодинамическое освещение. Для аварийного — отдельная DALI-шина.'}
    },svgFn:svgDALI},
  v10:{name:'0–10В',color:'#c08010',
    legend:[{c:'#d03030',l:'230В AC'},{c:'#c08010',l:'0–10В сигнал'},{c:'#d08010',l:'DC питание'}],
    nodes:{
      ac:{title:'Сеть 230В / 50Гц',tag:'AC ИСТОЧНИК',desc:'Силовая сеть питает драйверы напрямую. 0–10В — аналоговая система: отдельный сигнальный провод 0–10В задаёт яркость.',specs:[['Питание','230В AC'],['Сигнал','0–10В DC аналоговый'],['Кабель','2×0.5 мм² для сигнала']],tips:'0–10В — самый распространённый аналоговый интерфейс. Прост в монтаже и отладке. Совместим с большинством промышленных светильников.'},

let currentSys='rgbw', currentTab='desc';

function switchSys(sys){
  currentSys=sys;
  const sd=sysData[sys];
  Object.keys(sysData).forEach(k=>{
    const el=document.getElementById('st-'+k);
    el.classList.toggle('active',k===sys);
    el.style.setProperty('--tc',sysData[k].color);
  });
  document.getElementById('hint-text').textContent=`Нажмите на компонент для изучения · ${sd.name} система`;
  document.getElementById('diagram-area').innerHTML=sd.svgFn(sd.nodes,'showNode');
  document.getElementById('flow-legend').innerHTML=sd.legend.map(l=>`<div class="fl-item"><div class="fl-dot" style="background:${l.c}"></div>${l.l}</div>`).join('');
  document.getElementById('comp-tabs').style.setProperty('--tc',sd.color);
  document.getElementById('info-panel').style.setProperty('--tc',sd.color);
  resetInfo(sd.color);
}

function resetInfo(c){
  document.getElementById('tc-desc').innerHTML=`<h3 style="color:${c}">← Выберите компонент</h3><p>Нажмите на любой блок схемы для изучения его роли, характеристик и рекомендаций.</p>`;
  document.getElementById('tc-spec').innerHTML=`<p style="color:#c0c8d8">Выберите компонент</p>`;
  document.getElementById('tc-tips').innerHTML=`<p style="color:#c0c8d8">Выберите компонент</p>`;
}

function showNode(id){
  const sd=sysData[currentSys], d=sd.nodes[id];
  if(!d)return;
  const c=sd.color;
  document.getElementById('tc-desc').innerHTML=`<h3 style="color:${c};margin-bottom:6px">${d.title}</h3><span style="display:inline-block;font-size:9px;padding:2px 9px;border-radius:3px;background:#f0f2f8;color:${c};border:1px solid;border-color:${c}40;letter-spacing:.08em;margin-bottom:8px">${d.tag}</span><p>${d.desc}</p>`;
  document.getElementById('tc-spec').innerHTML=`<h3 style="color:${c};margin-bottom:10px">${d.title}</h3><div class="specs-grid">${d.specs.map(s=>`<div class="spec-row"><span>${s[0]}</span><span style="color:#2a3040">${s[1]}</span></div>`).join('')}</div>`;
  document.getElementById('tc-tips').innerHTML=`<h3 style="color:${c};margin-bottom:8px">Советы инженера</h3><div class="tip-text">${d.tips}</div>`;
  switchCT(currentTab);
}

function switchCT(tab){
  currentTab=tab;
  ['desc','spec','tips'].forEach(t=>{
    document.getElementById('ct-'+t).classList.toggle('active',t===tab);
    document.getElementById('tc-'+t).classList.toggle('active',t===tab);
  });
}

switchSys('rgbw');
</script>
