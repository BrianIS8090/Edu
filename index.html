<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduPlatform</title>

  <!-- Favicon: SVG book-open -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 24 24' fill='none' stroke='%234f46e5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z'/><path d='M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z'/></svg>">

  <!-- CDN-зависимости -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* Сброс стилей */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #f5f5f5; color: #111;
    }

    /* Хедер */
    .header {
      display: flex; align-items: center; gap: 16px;
      padding: 12px 24px; background: #fff; border-bottom: 1px solid #e5e7eb;
      position: fixed; top: 0; left: 0; right: 0; z-index: 10; height: 52px;
    }
    .header-logo {
      font-weight: 700; font-size: 16px; white-space: nowrap;
      display: flex; align-items: center; gap: 8px; color: #111; flex-shrink: 0;
    }

    /* Основной layout */
    .main { display: flex; margin-top: 52px; min-height: calc(100vh - 52px); }

    /* Sidebar */
    .sidebar {
      width: 390px; background: #fff; border-right: 1px solid #e5e7eb;
      padding: 20px 0; position: fixed; top: 52px; bottom: 0; overflow-y: auto;
      transition: width 0.25s ease, transform 0.25s ease;
    }
    .sidebar-section { margin-bottom: 20px; }
    .sidebar-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: #999; padding: 0 20px; margin-bottom: 8px;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 8px; padding: 7px 20px;
      font-size: 13px; color: #555; cursor: pointer; transition: all 0.15s;
    }
    .sidebar-item:hover { background: #f9fafb; color: #111; }
    .sidebar-item.active { background: #f0f0ff; color: #4f46e5; font-weight: 500; }
    .sidebar-item i { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-count { margin-left: auto; font-size: 11px; color: #bbb; }

    .sidebar-lesson {
      display: flex; align-items: center; gap: 8px; padding: 6px 20px 6px 32px;
      font-size: 12px; color: #666; cursor: pointer; transition: all 0.15s;
      border-left: 2px solid transparent;
    }
    .sidebar-lesson:hover { background: #f9fafb; color: #111; }
    .sidebar-lesson.active {
      color: #4f46e5; font-weight: 500;
      border-left-color: #4f46e5; background: #f8f7ff;
    }
    .sidebar-lesson i { width: 14px; height: 14px; flex-shrink: 0; }

    /* Заголовок категории в sidebar (accordion) */
    .sidebar-category-header {
      display: flex; align-items: center; gap: 8px; padding: 8px 16px;
      font-size: 13px; color: #333; cursor: pointer; transition: all 0.15s;
    }
    .sidebar-category-header:hover { background: #f9fafb; }
    .sidebar-category-header.active { background: #eff6ff; color: #4f46e5; font-weight: 600; }
    .sidebar-category-icon { display: flex; align-items: center; justify-content: center; }
    .sidebar-category-icon i { width: 16px; height: 16px; }
    .sidebar-category-name { flex: 1; font-weight: 500; }

    /* Подкатегории в sidebar */
    .sidebar-subcategories {
      padding-left: 40px;
    }
    .sidebar-subcategory {
      display: flex; align-items: center; gap: 8px; padding: 6px 12px 6px 0;
      font-size: 12px; color: #666; cursor: pointer; transition: all 0.15s;
      border-left: 2px solid transparent;
    }
    .sidebar-subcategory:hover { background: #f9fafb; color: #111; }
    .sidebar-subcategory.active {
      color: #4f46e5; font-weight: 500;
      border-left-color: #4f46e5; background: #f8f7ff;
    }
    .subcategory-bullet {
      font-size: 11px; color: #bbb; margin-right: 4px;
    }
    .subcategory-name { flex: 1; }

    /* Кнопка сворачивания sidebar — новый стиль таба */
    .sidebar-toggle {
      position: fixed; top: 50%; transform: translateY(-50%);
      left: 390px; z-index: 11;
      width: 20px; height: 52px; border-radius: 0 6px 6px 0;
      background: #fff; border: 1px solid #e5e7eb; border-left: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: left 0.25s ease, background 0.15s;
      box-shadow: 2px 0 6px rgba(0,0,0,0.06);
    }
    .sidebar-toggle:hover { background: #f0f0ff; border-color: #c7d2fe; }
    .sidebar-toggle i { width: 14px; height: 14px; color: #888; transition: transform 0.25s; }

    /* Свёрнутый sidebar (десктоп) */
    .sidebar-collapsed .sidebar { width: 0; padding: 0; overflow: hidden; border-right: none; }
    .sidebar-collapsed .sidebar-toggle { left: 0; border-radius: 0 6px 6px 0; }
    .sidebar-collapsed .sidebar-toggle i { transform: rotate(180deg); }
    .sidebar-collapsed .content-wrapper { margin-left: 0; }
    
    .sidebar-overlay { display: none; } /* Скрыт на десктопе */

    /* Контент */
    .content-wrapper {
      flex: 1; margin-left: 390px;
      display: flex; justify-content: center;
      transition: margin-left 0.25s ease;
      min-width: 0; /* Важно для предотвращения растягивания flex-контейнера длинным контентом */
    }
    .content { width: 100%; max-width: 968px; padding: 32px 48px; }
    .content.content-wide { max-width: 1100px; }

    /* Группа категории на вкладке "Все" */
    .category-group { margin-bottom: 32px; }
    .category-group-header {
      font-size: 16px; font-weight: 600; color: #111; margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
      padding-bottom: 8px; border-bottom: 1px solid #e5e7eb;
    }

    /* Плитки (сетка 4 колонки) для вкладки "Все" */
    .tiles-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    }
    .tile-card {
      display: flex; flex-direction: column; padding: 16px;
      background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
      cursor: pointer; transition: all 0.15s;
    }
    .tile-card:hover {
      border-color: #c7d2fe;
      box-shadow: 0 2px 8px rgba(79,70,229,0.06);
    }
    .tile-icon {
      width: 40px; height: 40px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px;
    }
    .tile-title { font-size: 13px; font-weight: 600; color: #111; margin-bottom: 6px; line-height: 1.3; }
    .tile-desc { font-size: 11px; color: #888; margin-bottom: 8px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .tile-tags { display: flex; gap: 4px; flex-wrap: wrap; }

    /* Карточки уроков (список — для страницы категории) */
    .lessons-grid { display: flex; flex-direction: column; gap: 12px; }
    .lesson-card {
      display: flex; align-items: center; gap: 16px; padding: 16px 20px;
      background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
      cursor: pointer; transition: all 0.15s;
    }
    .lesson-card:hover {
      border-color: #c7d2fe;
      box-shadow: 0 2px 8px rgba(79,70,229,0.06);
    }
    .lesson-icon {
      width: 40px; height: 40px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .lesson-info { flex: 1; min-width: 0; }
    .lesson-title { font-size: 14px; font-weight: 600; color: #111; margin-bottom: 4px; }
    .lesson-desc { font-size: 12px; color: #888; margin-bottom: 6px; }
    .lesson-tags-row { display: flex; gap: 4px; flex-wrap: wrap; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 12px; background: #f3f4f6; color: #666; }
    .tag-type { background: #e0e7ff; color: #4f46e5; font-weight: 500; }
    .tag-type.interactive { background: #ecfdf5; color: #059669; }

    /* Страница урока */
    .lesson-page { display: none; }

    /* Кнопка возврата — верхний левый угол статьи */
    .breadcrumb {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 500;
      color: #4f46e5; background: #f0f0ff;
      border: 1px solid #e0e7ff;
      border-radius: 20px; padding: 6px 14px;
      cursor: pointer; margin-bottom: 20px;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .breadcrumb:hover { background: #e0e0ff; border-color: #c7d2fe; }
    .lesson-page-header { margin-bottom: 24px; }
    .lesson-page-header h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
    .lesson-page-tags { display: flex; gap: 6px; flex-wrap: wrap; }

    /* Markdown рендер */
    .md-body { font-size: 15px; line-height: 1.75; color: #333; }
    .md-body h1 { font-size: 22px; font-weight: 700; margin: 28px 0 12px; color: #111; }
    .md-body h2 {
      font-size: 18px; font-weight: 600; margin: 28px 0 12px; color: #111;
      padding-bottom: 6px; border-bottom: 1px solid #e5e7eb;
    }
    .md-body h3 { font-size: 15px; font-weight: 600; margin: 20px 0 8px; color: #222; }
    .md-body p { margin-bottom: 14px; }
    .md-body ul, .md-body ol { padding-left: 24px; margin-bottom: 14px; }
    .md-body li { margin-bottom: 6px; }
    .md-body a { color: #4f46e5; text-decoration: none; }
    .md-body a:hover { text-decoration: underline; }
    .md-body img { max-width: 100%; border-radius: 8px; margin: 16px 0; border: 1px solid #e5e7eb; cursor: zoom-in; }
    .md-body code {
      background: #f3f4f6; padding: 2px 6px; border-radius: 4px;
      font-size: 13px; font-family: 'JetBrains Mono', monospace;
    }
    .md-body pre {
      background: #1e1e2e; color: #cdd6f4; padding: 16px;
      border-radius: 8px; margin: 16px 0; overflow-x: auto;
    }
    .md-body pre code { background: none; padding: 0; color: inherit; }
    .md-body hr { border: none; border-top: 1px solid #e5e7eb; margin: 24px 0; }
    .md-body strong { font-weight: 600; color: #111; }
    .md-body blockquote {
      border-left: 3px solid #4f46e5; padding-left: 16px;
      margin: 16px 0; color: #666;
    }
    .md-body table {
      width: 100%; border-collapse: collapse; margin: 16px 0;
      font-size: 14px;
    }
    .md-body th {
      background: #f3f4f6; font-weight: 600; color: #111;
      text-align: left; padding: 10px 12px;
      border: 1px solid #e5e7eb;
    }
    .md-body td {
      padding: 10px 12px; border: 1px solid #e5e7eb;
    }
    .md-body tr:hover { background: #f9fafb; }
    .md-body thead tr:hover { background: #f3f4f6; }

    /* iframe для модулей */
    .module-frame {
      width: 100%; height: 80vh;
      border: 1px solid #e5e7eb; border-radius: 8px; margin-top: 8px;
    }

    .section-header {
      font-size: 18px; font-weight: 600; color: #111; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .subcategory-group-header {
      font-size: 13px; font-weight: 600; color: #6b7280; text-transform: uppercase;
      letter-spacing: 0.05em; margin: 20px 0 8px; padding-bottom: 6px;
      border-bottom: 1px solid #e5e7eb;
    }

    /* Лайтбокс-галерея */
    .lightbox {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }
    .lightbox.open { opacity: 1; visibility: visible; }
    .lightbox img {
      max-width: 90vw; max-height: 90vh;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      object-fit: contain;
      transition: transform 0.2s;
    }
    .lightbox-close {
      position: absolute; top: 16px; right: 16px;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.15); border: none;
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.3); }
    .lightbox-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.15); border: none;
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .lightbox-nav:hover { background: rgba(255,255,255,0.3); }
    .lightbox-nav.prev { left: 16px; }
    .lightbox-nav.next { right: 16px; }
    .lightbox-nav[disabled] { opacity: 0.3; cursor: default; }
    .lightbox-counter {
      position: absolute; bottom: 16px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.7); font-size: 13px;
    }

    /* Полоса прогресса чтения (под хедером) */
    .reading-progress-bar {
      position: fixed; top: 52px; left: 0; right: 0; height: 3px;
      z-index: 9; background: transparent;
    }
    .reading-progress-fill {
      height: 100%; width: 0%; background: #4f46e5;
      transition: width 0.1s linear;
    }

    /* Поиск в хедере — слева рядом с логотипом */
    .header-search {
      position: relative; display: flex; align-items: center;
      width: 280px; flex-shrink: 0;
    }
    .header-search input {
      width: 100%; padding: 7px 12px 7px 34px;
      border: 1px solid #e5e7eb; border-radius: 8px;
      font-size: 13px; color: #111; background: #f9fafb;
      outline: none; transition: border-color 0.15s, background 0.15s;
    }
    .header-search input:focus { border-color: #a5b4fc; background: #fff; }
    .header-search input::placeholder { color: #aaa; }
    .header-search .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      width: 15px; height: 15px; color: #aaa; pointer-events: none;
    }
    .header-search .search-clear {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: #aaa; cursor: pointer;
      display: none; align-items: center; justify-content: center;
      border-radius: 50%; background: #e5e7eb;
    }
    .header-search .search-clear:hover { background: #c7d2fe; color: #4f46e5; }
    .header-search.has-value .search-clear { display: flex; }

    /* Результаты поиска */
    .search-results-header {
      font-size: 13px; color: #888; margin-bottom: 16px;
    }
    .search-highlight { background: #fef08a; border-radius: 2px; padding: 0 1px; }
    .search-no-results {
      display: flex; flex-direction: column; align-items: center;
      padding: 60px 20px; color: #aaa;
    }
    .search-no-results i { width: 48px; height: 48px; margin-bottom: 12px; color: #d1d5db; }
    .search-no-results p { font-size: 14px; }

    /* Баннер последней статьи — всегда виден */
    .last-read-banner {
      display: flex; position: relative; overflow: hidden;
      border-radius: 12px; margin-bottom: 24px;
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
      background-size: cover; background-position: center;
      min-height: 100px;
    }
    .banner-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.45); border-radius: 12px;
    }
    .banner-content {
      position: relative; z-index: 1;
      display: flex; align-items: center; gap: 16px;
      padding: 20px 24px; width: 100%;
    }
    .banner-icon {
      width: 44px; height: 44px; border-radius: 10px;
      background: rgba(255,255,255,0.15); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .banner-icon i { width: 22px; height: 22px; color: #fff; }
    .banner-text { flex: 1; min-width: 0; }
    .banner-label {
      font-size: 11px; color: rgba(255,255,255,0.7);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
    }
    .banner-title {
      font-size: 15px; font-weight: 600; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 8px;
    }
    .banner-progress-track {
      height: 4px; background: rgba(255,255,255,0.25);
      border-radius: 2px; overflow: hidden;
    }
    .banner-progress-fill {
      height: 100%; background: #fff; border-radius: 2px;
      transition: width 0.3s ease;
    }
    .banner-progress-label {
      font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 4px;
    }
    .banner-btn {
      flex-shrink: 0; padding: 8px 18px;
      background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.35);
      border-radius: 8px; color: #fff; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: background 0.15s; white-space: nowrap;
    }
    .banner-btn:hover { background: rgba(255,255,255,0.35); }

    /* Прогресс на карточках */
    .card-progress-bar {
      height: 3px; background: #e5e7eb; border-radius: 0 0 7px 7px;
      overflow: hidden; margin-top: 8px;
    }
    .card-progress-fill {
      height: 100%; background: #4f46e5; border-radius: 0 0 7px 7px;
      transition: width 0.3s;
    }
    .card-progress-label {
      font-size: 10px; color: #6366f1; font-weight: 600; margin-top: 4px;
    }
    .card-done-badge {
      position: absolute; top: 6px; right: 6px;
      width: 18px; height: 18px; color: #10b981;
    }
    .tile-card { position: relative; }
    .lesson-card { position: relative; }

    /* Тег времени чтения */
    .tag-time { background: #f0fdf4; color: #16a34a; }

    /* Состояние загрузки */

    .loading {
      display: flex; align-items: center; justify-content: center;
      min-height: 200px; color: #999; font-size: 14px;
    }

    /* Мобильная адаптация */
    @media (max-width: 768px) {
      /* Sidebar: оверлей поверх контента */
      .sidebar,
      .sidebar-collapsed .sidebar {
        width: 320px !important;
        padding: 20px 0 !important;
        transform: translateX(-100%) !important;
        z-index: 20 !important;
        box-shadow: 2px 0 8px rgba(0,0,0,0.1) !important;
        border-right: 1px solid #e5e7eb !important;
        overflow-y: auto !important;
      }
      
      /* Когда не свёрнуто (открыто) */
      body:not(.sidebar-collapsed) .sidebar {
        transform: translateX(0) !important;
      }

      /* Кнопка открытия/закрытия sidebar */
      .sidebar-toggle,
      .sidebar-collapsed .sidebar-toggle {
        left: 0 !important;
        top: 50% !important; transform: translateY(-50%) !important;
        width: 20px !important; height: 52px !important;
        border-radius: 0 6px 6px 0 !important;
        z-index: 21 !important;
      }
      .sidebar-collapsed .sidebar-toggle i { transform: rotate(180deg) !important; }
      
      body:not(.sidebar-collapsed) .sidebar-toggle {
        left: 300px !important;
      }
      body:not(.sidebar-collapsed) .sidebar-toggle i { transform: rotate(0deg) !important; }
      
      /* Затемнение фона при открытом меню (используем явный элемент для кликов) */
      .sidebar-overlay { display: none; }
      body:not(.sidebar-collapsed) .sidebar-overlay {
        display: block !important;
        position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 15;
      }

      /* Хедер: поиск занимает оставшееся место, логотип компактный */
      .header { gap: 10px !important; padding: 10px 14px !important; }
      .header-logo span { display: none; }
      .header-search { width: auto !important; flex: 1 !important; }

      /* Контент всегда занимает всю ширину */
      .content-wrapper,
      .sidebar-collapsed .content-wrapper { 
        margin-left: 0 !important; width: 100vw !important; overflow-x: hidden !important; 
      }
      .content { padding: 16px !important; width: 100% !important; box-sizing: border-box !important; overflow-x: hidden; }

      /* Плитки: 1-2 колонки */
      .tiles-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)) !important; }

      /* Заголовок урока */
      .lesson-page-header h1 { font-size: 20px !important; word-break: break-word !important; }
      .section-header { font-size: 16px !important; }

      /* Touch targets: увеличить до минимума 44px */
      .sidebar-toggle { width: 44px !important; height: 44px !important; }
      .sidebar-item { padding: 12px 20px !important; }
      .sidebar-lesson { padding: 12px 20px 12px 32px !important; }
      .sidebar-category-header { padding: 12px 16px !important; }

      /* Контент и элементы не должны растягивать контейнер */
      .md-body { word-break: break-word; overflow-wrap: break-word; }
      .md-body pre { max-width: 100%; overflow-x: auto !important; box-sizing: border-box; }
      
      /* Картинки и iframe */
      .md-body img { max-width: 100% !important; height: auto !important; display: block !important; margin: 12px auto !important; box-sizing: border-box !important; }
      .module-frame { height: 60vh !important; }

      /* Таблицы: горизонтальный скролл */
      .md-body table { display: block !important; overflow-x: auto !important; white-space: nowrap !important; max-width: 100%; }

      /* Перенос длинных ссылок */
      .md-body a { word-break: break-word !important; overflow-wrap: break-word !important; display: inline !important; }
    }
  </style>
</head>
<body>
  <!-- Полоса прогресса чтения (под хедером) -->
  <div class="reading-progress-bar" id="reading-progress-bar">
    <div class="reading-progress-fill" id="reading-progress-fill"></div>
  </div>

  <!-- Хедер -->
  <div class="header">
    <div class="header-logo">
      <i data-lucide="book-open" style="width:20px;height:20px;color:#4f46e5;"></i>
      <span>EduPlatform</span>
    </div>
    <div class="header-search" id="header-search">
      <i data-lucide="search" class="search-icon"></i>
      <input type="text" id="search-input" placeholder="Поиск по материалам..." autocomplete="off">
      <span class="search-clear" id="search-clear" onclick="app.clearSearch()">
        <i data-lucide="x" style="width:10px;height:10px;"></i>
      </span>
    </div>
  </div>

  <div class="main">
    <!-- Overlay для мобильной версии -->
    <div class="sidebar-overlay" onclick="app.toggleSidebar()"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="loading">Загрузка...</div>
    </div>
    <!-- Кнопка сворачивания sidebar -->
    <div class="sidebar-toggle" onclick="app.toggleSidebar()">
      <i data-lucide="chevron-left" id="sidebar-toggle-icon"></i>
    </div>

    <div class="content-wrapper">
      <!-- Список материалов -->
      <div class="content" id="content-list">
        <!-- Баннер последней статьи -->
        <div class="last-read-banner" id="last-read-banner">
          <div class="banner-overlay"></div>
          <div class="banner-content">
            <div class="banner-icon">
              <i data-lucide="book-open"></i>
            </div>
            <div class="banner-text">
              <div class="banner-label">Продолжить чтение</div>
              <div class="banner-title" id="banner-title"></div>
              <div class="banner-progress-track">
                <div class="banner-progress-fill" id="banner-progress-fill"></div>
              </div>
              <div class="banner-progress-label" id="banner-progress-label"></div>
            </div>
            <button class="banner-btn" id="banner-btn">Открыть</button>
          </div>
        </div>
        <!-- Контент списка (перезаписывается при навигации) -->
        <div id="content-list-inner">
          <div class="loading">Загрузка каталога...</div>
        </div>
      </div>

      <!-- Страница урока/модуля (динамическая) -->
      <div class="content lesson-page" id="content-page"></div>
    </div>
  </div>

  <!-- Лайтбокс-галерея -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="app.closeLightbox()">
      <i data-lucide="x" style="width:20px;height:20px;"></i>
    </button>
    <button class="lightbox-nav prev" onclick="app.lightboxPrev()">
      <i data-lucide="chevron-left" style="width:24px;height:24px;"></i>
    </button>
    <img id="lightbox-img" src="" alt="">
    <button class="lightbox-nav next" onclick="app.lightboxNext()">
      <i data-lucide="chevron-right" style="width:24px;height:24px;"></i>
    </button>
    <div class="lightbox-counter" id="lightbox-counter"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
